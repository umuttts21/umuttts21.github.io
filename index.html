<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Keyaru | Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
body { min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; background: url("https://cdn.discordapp.com/banners/931547111865085952/8378ef53997d00e986e35f438f7bf4a8.png?size=4096") center/cover no-repeat fixed; }
body::before { content: ""; position: fixed; inset: 0; background: rgba(0, 0, 0, .45); }

.portfolio-card { position: relative; overflow: hidden; width: 100%; max-width: 380px; padding: 40px 28px; border-radius: 28px; background: rgba(15, 15, 20, .35); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, .18); box-shadow: 0 25px 45px rgba(0, 0, 0, .5); color: white; }

.profile-container { text-align: center; margin-bottom: 15px; }
.profile-img { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(255, 255, 255, .5); }

.header-section { text-align: center; margin-bottom: 25px; }
.header-section h1 { font-size: 28px; letter-spacing: 3px; font-weight: 600; }
.header-section p { font-size: 12px; opacity: .7; letter-spacing: 3px; margin-top: 6px; margin-bottom: 12px; }

.lang-badges { display: flex; justify-content: center; gap: 8px; }
.lang-badge { font-size: 10px; font-weight: 500; letter-spacing: 1px; padding: 4px 12px; border-radius: 12px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.15); color: rgba(255, 255, 255, 0.85); backdrop-filter: blur(4px); }

.accordion-item { margin-bottom: 12px; border-radius: 18px; background: rgba(20, 20, 25, .25); border: 1px solid rgba(255, 255, 255, .15); overflow: hidden; }
.accordion-btn { width: 100%; padding: 18px 22px; background: none; border: none; color: white; display: flex; justify-content: space-between; align-items: center; font-size: 13px; font-weight: 600; letter-spacing: 2px; cursor: pointer; }
.accordion-btn .arrow { display: flex; align-items: center; justify-content: center; transition: transform .4s cubic-bezier(0.25, 0.46, 0.45, 0.94); opacity: 0.55; }
.accordion-btn.open .arrow { transform: rotate(-180deg); opacity: 1; }

.accordion-panel { display: grid; grid-template-rows: 0fr; opacity: 0; transition: grid-template-rows 0.38s ease, opacity 0.3s ease; }
.accordion-panel.open { grid-template-rows: 1fr; opacity: 1; }
.panel-content { overflow: hidden; padding: 0 20px 20px; }
.game-list { display: flex; flex-direction: column; gap: 12px; }
.section-title { font-size: 10px; opacity: .5; margin-bottom: 10px; letter-spacing: 1px; }

.project-card { background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.05); border-radius: 14px; padding: 14px 16px; transition: background .25s, transform .2s; }
.project-card .game-title { font-size: 13px; font-weight: 600; }
.project-card .game-role { font-size: 11px; opacity: .5; margin-top: 4px; }

/* Stats Stil Güncellemesi */
.game-stats { display: flex; align-items: center; gap: 8px; font-size: 11px; opacity: .8; margin-top: 8px; }
.pulse-dot { width: 7px; height: 7px; border-radius: 50%; background: #22c55e; box-shadow: 0 0 10px #22c55e; animation: pulseDot 1.5s infinite; }
@keyframes pulseDot { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.4); opacity: 0.7; } }

.user-icon { width: 14px; height: 14px; fill: rgba(255,255,255,0.6); }

#splash { position: fixed; inset: 0; z-index: 9999; background: rgba(0, 0, 0, 0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px; cursor: pointer; transition: opacity 0.6s ease; backdrop-filter: blur(6px); }
#splash.hidden { opacity: 0; pointer-events: none; }
</style>
</head>

<body>
<div id="splash">
  <div style="font-size:32px; opacity:0.6;">♪</div>
  <div style="font-size:13px; letter-spacing:4px; color:rgba(255,255,255,0.55);">TAP TO ENTER</div>
</div>

<div class="portfolio-card">
  <div class="profile-container">
    <div style="position:relative; display:inline-block;">
      <img class="profile-img" src="https://cdn.discordapp.com/avatars/931547111865085952/a03a042296661e0487c639f766fbfda6.png?size=4096">
      <div id="discord-status-dot" style="position:absolute; bottom:5px; right:5px; width:16px; height:16px; border-radius:50%; border:3px solid #0f0f14; background:#747f8d;"></div>
    </div>
  </div>

  <div class="header-section">
    <h1>KEYARU</h1>
    <p>MODERATOR</p>
    <div class="lang-badges">
      <span class="lang-badge">🇹🇷 TR</span>
      <span class="lang-badge">🇬🇧 EN</span>
    </div>
  </div>

  <div class="accordion">
    <div class="accordion-item">
      <button class="accordion-btn">PORTFOLIO <span class="arrow"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"></polyline></svg></span></button>
      <div class="accordion-panel">
        <div class="panel-content">
          <div class="game-list" id="serverList">
            <!-- Sunucular buraya eklenecek -->
            <div class="project-card" data-invite="animehorizon">
              <div class="game-title">Anime Horizon</div>
              <div class="game-role">Moderator</div>
              <div class="game-stats">Loading...</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const splash = document.getElementById("splash");
  splash.onclick = () => splash.classList.add("hidden");

  async function loadStats() {
    const cards = document.querySelectorAll('.project-card');
    cards.forEach(async (card) => {
      const code = card.getAttribute('data-invite');
      try {
        const res = await fetch(`https://discord.com/api/v9/invites/${code}?with_counts=true`);
        const data = await res.json();
        card.querySelector('.game-stats').innerHTML = `
          <div class="pulse-dot"></div> ${data.approximate_presence_count} Online 
          <svg class="user-icon" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg> 
          ${data.approximate_member_count}
        `;
      } catch(e) { card.querySelector('.game-stats').innerHTML = "Unavailable"; }
    });
  }
  loadStats();
</script>
</body>
</html>
